name: Step 2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/project-pulse-plan.md

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  find_exercise:
    if: github.event_name != 'push' || (github.event.created == false && github.event.head_commit.message != 'Initial commit')
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.9.3

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get response templates
        uses: actions/checkout@v6
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v4
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-author: github-actions[bot]
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Check Project Pulse plan exists
        id: check-plan-file
        continue-on-error: true
        uses: skills/exercise-toolkit/actions/file-exists@v0.9.3
        with:
          file: docs/project-pulse-plan.md

      - name: Check Project Pulse context
        id: check-project-pulse
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: Project Pulse
          case-sensitive: false

      - name: Check Designer responsibility
        id: check-designer
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: Designer
          case-sensitive: false

      - name: Check Coder responsibility
        id: check-coder
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: Coder
          case-sensitive: false

      - name: Check HTML file assignment
        id: check-index-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: app/index.html
          case-sensitive: false

      - name: Check CSS file assignment
        id: check-styles-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: app/styles.css
          case-sensitive: false

      - name: Check data file assignment
        id: check-data-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: app/project-data.json
          case-sensitive: false

      - name: Check launch file assignment
        id: check-launch-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: .vscode/launch.json
          case-sensitive: false

      - name: Check dependency planning
        id: check-dependencies
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: dependencies
          case-sensitive: false

      - name: Check work ordering
        id: check-ordering
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: parallel
          case-sensitive: false

      - name: Check validation planning
        id: check-validation
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/project-pulse-plan.md
          keyphrase: validation
          case-sensitive: false

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "Checked for docs/project-pulse-plan.md"
                passed: ${{ steps.check-plan-file.outcome == 'success' }}
              - description: "Checked for Project Pulse planning details"
                passed: ${{ steps.check-project-pulse.outcome == 'success' && steps.check-designer.outcome == 'success' && steps.check-coder.outcome == 'success' }}
              - description: "Checked for app file assignments"
                passed: ${{ steps.check-index-file-reference.outcome == 'success' && steps.check-styles-file-reference.outcome == 'success' && steps.check-data-file-reference.outcome == 'success' }}
              - description: "Checked for launch configuration assignment"
                passed: ${{ steps.check-launch-file-reference.outcome == 'success' }}
              - description: "Checked for dependencies, ordering, and validation"
                passed: ${{ steps.check-dependencies.outcome == 'success' && steps.check-ordering.outcome == 'success' && steps.check-validation.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get response templates
        uses: actions/checkout@v6
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
