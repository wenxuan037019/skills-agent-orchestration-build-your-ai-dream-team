name: Step 4 # Last step of the exercise

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/final-handoff.md

permissions:
  contents: write
  actions: write
  issues: write

env:
  REVIEW_FILE: ".github/steps/x-review.md"

jobs:
  find_exercise:
    if: github.event_name != 'push' || (github.event.created == false && github.event.head_commit.message != 'Initial commit')
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.9.3

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get response templates
        uses: actions/checkout@v6
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v4
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-author: github-actions[bot]
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Check final handoff exists
        id: check-final-file
        continue-on-error: true
        uses: skills/exercise-toolkit/actions/file-exists@v0.9.3
        with:
          file: docs/final-handoff.md

      - name: Check Project Pulse context
        id: check-project-pulse
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: Project Pulse
          case-sensitive: false

      - name: Check Orchestrator handoff
        id: check-orchestrator
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: Orchestrator
          case-sensitive: false

      - name: Check Planner handoff
        id: check-planner
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: Planner
          case-sensitive: false

      - name: Check Coder handoff
        id: check-coder
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: Coder
          case-sensitive: false

      - name: Check Designer handoff
        id: check-designer
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: Designer
          case-sensitive: false

      - name: Check HTML handoff
        id: check-index-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: app/index.html
          case-sensitive: false

      - name: Check CSS handoff
        id: check-styles-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: app/styles.css
          case-sensitive: false

      - name: Check data handoff
        id: check-data-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: app/project-data.json
          case-sensitive: false

      - name: Check launch file handoff
        id: check-launch-file-reference
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: .vscode/launch.json
          case-sensitive: false

      - name: Check launch configuration handoff
        id: check-launch-name
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: Run Project Pulse Dashboard
          case-sensitive: false

      - name: Check validation notes
        id: check-validation
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: validation
          case-sensitive: false

      - name: Check final handoff
        id: check-handoff
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: docs/final-handoff.md
          keyphrase: handoff
          case-sensitive: false

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 4
            results_table:
              - description: "Checked for docs/final-handoff.md"
                passed: ${{ steps.check-final-file.outcome == 'success' }}
              - description: "Checked for agent names, app files, validation, and final handoff"
                passed: ${{ steps.check-project-pulse.outcome == 'success' && steps.check-orchestrator.outcome == 'success' && steps.check-planner.outcome == 'success' && steps.check-coder.outcome == 'success' && steps.check-designer.outcome == 'success' && steps.check-index-file-reference.outcome == 'success' && steps.check-styles-file-reference.outcome == 'success' && steps.check-data-file-reference.outcome == 'success' && steps.check-launch-file-reference.outcome == 'success' && steps.check-launch-name.outcome == 'success' && steps.check-validation.outcome == 'success' && steps.check-handoff.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_review_content:
    name: Post review content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get response templates
        uses: actions/checkout@v6
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Create comment - step finished - final review next
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/lesson-review.md

      - name: Create comment - add review content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.REVIEW_FILE }}

      - name: Disable current workflow
        run: gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finish_exercise:
    name: Finish Exercise
    needs: [find_exercise, post_review_content]
    uses: skills/exercise-toolkit/.github/workflows/finish-exercise.yml@v0.9.3
    with:
      issue-url: ${{ needs.find_exercise.outputs.issue-url }}
      exercise-title: "Agent Orchestration Build Your AI Dream Team"
